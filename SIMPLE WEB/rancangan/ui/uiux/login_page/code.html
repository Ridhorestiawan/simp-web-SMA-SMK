<body class="bg-surface font-body-md text-on-surface antialiased">
<!-- Top Navigation Bar (Simplified for Login) -->
<header class="fixed top-0 w-full z-50 flex justify-center items-center h-16 bg-transparent">
<!-- Logo Placeholder can go here if needed as a floating element -->
</header>
<main class="min-h-screen split-bg flex flex-col items-center justify-center px-margin-mobile md:px-margin-desktop py-12">
<!-- Login Card Container -->
<div class="w-full max-w-[440px] bg-surface-container-lowest rounded-xl custom-shadow overflow-hidden p-8 md:p-10 flex flex-col items-center animate-in fade-in zoom-in duration-500">
<!-- Logo Section -->
<div class="mb-6 flex flex-col items-center">
<div class="w-16 h-16 bg-primary-container rounded-xl flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-on-primary-container text-4xl" data-icon="school">school</span>
</div>
<h1 class="font-headline-md text-headline-md text-primary text-center leading-tight">
                    LMS SMA/SMK
                </h1>
<p class="font-label-sm text-label-sm text-outline mt-2 tracking-wide uppercase">
                    Sistem Informasi Manajemen Pembelajaran
                </p>
</div>
<!-- Form Section -->
<form class="w-full space-y-6" onsubmit="event.preventDefault(); window.location.reload();">
<!-- Email Field -->
<div class="space-y-1.5">
<label class="block font-label-sm text-label-sm text-on-surface-variant" for="email">
                        Email Institusi
                    </label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-lg" data-icon="mail">mail</span>
<input class="w-full pl-10 pr-4 py-3 bg-surface border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all outline-none text-body-md" id="email" name="email" placeholder="nama@sekolah.sch.id" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-1.5">
<label class="block font-label-sm text-label-sm text-on-surface-variant" for="password">
                        Kata Sandi
                    </label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-lg" data-icon="lock">lock</span>
<input class="w-full pl-10 pr-12 py-3 bg-surface border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all outline-none text-body-md" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button aria-label="Tampilkan kata sandi" class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors p-1" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined text-lg" data-icon="visibility" id="pw-icon">visibility</span>
</button>
</div>
</div>
<!-- Additional Options -->
<div class="flex items-center justify-between py-1">
<label class="flex items-center gap-2 cursor-pointer group">
<input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary transition-all cursor-pointer" type="checkbox"/>
<span class="font-label-sm text-label-sm text-on-surface-variant group-hover:text-primary">Ingat Saya</span>
</label>
<a class="font-label-sm text-label-sm text-primary hover:underline font-semibold" href="#">Lupa Kata Sandi?</a>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary text-on-primary font-title-sm text-title-sm py-4 rounded-xl hover:bg-primary-container active:scale-[0.98] transition-all duration-150 shadow-sm flex items-center justify-center gap-2" type="submit">
                    Masuk
                    <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Footer Policy -->
<div class="mt-8 pt-6 border-t border-outline-variant w-full text-center">
<p class="font-label-sm text-label-sm text-outline">
                    © 2024 Manajemen Sekolah Terpadu. <br class="md:hidden"/> Hak Cipta Dilindungi.
                </p>

</div>

<script>
        function togglePassword() {
            const pwInput = document.getElementById('password');
            const pwIcon = document.getElementById('pw-icon');
            
            if (pwInput.type === 'password') {
                pwInput.type = 'text';
                pwIcon.textContent = 'visibility_off';
            } else {
                pwInput.type = 'password';
                pwIcon.textContent = 'visibility';
            }
        }

        // Add subtle focus ring effect to the card on interaction
        const formInputs = document.querySelectorAll('input');
        const loginCard = document.querySelector('.custom-shadow');
        
        formInputs.forEach(input => {
            input.addEventListener('focus', () => {
                loginCard.style.boxShadow = '0 10px 25px -5px rgba(0, 91, 191, 0.1), 0 8px 10px -6px rgba(0, 91, 191, 0.1)';
            });
            input.addEventListener('blur', () => {
                loginCard.style.boxShadow = '0 2px 8px rgba(0, 0, 0, 0.08)';
            });
        });
    </script>
